name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruby-syntax:
    name: Ruby Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Check Ruby syntax
        run: |
          for f in su_bridge/lib/su_bridge/**/*.rb su_bridge/spec/**/*.rb; do
            ruby -c "$f" || exit 1
          done

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python3 -m py_compile mcp_server/mcp_server/**/*.py
          python3 -m py_compile mcp_server/tests/**/*.py

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd mcp_server
          pip install uv
          uv sync --extra dev

      - name: Run Python tests
        run: |
          cd mcp_server
          uv run --extra dev pytest tests/ -m "not integration" -v --tb=short

      - name: Check plugin startup path
        run: ./mcp_server/start.sh --startup-check

      - name: Run headless product smoke
        run: |
          cd mcp_server
          uv run --extra dev sketchup-agent smoke /tmp/sah-ci-smoke --force

      - name: Check bridge installer dry run
        run: |
          cd mcp_server
          uv run --extra dev sketchup-agent install-bridge --plugins-dir /tmp/sah-plugins --dry-run

      - name: Build package wheel
        run: |
          cd mcp_server
          uv build --wheel --out-dir /tmp/sah-dist --clear

      - name: Check installed wheel bridge runtime
        run: |
          python3 -m venv /tmp/sah-wheel-venv
          /tmp/sah-wheel-venv/bin/pip install /tmp/sah-dist/*.whl
          /tmp/sah-wheel-venv/bin/sketchup-agent install-bridge --plugins-dir /tmp/sah-wheel-plugins --dry-run
          /tmp/sah-wheel-venv/bin/sketchup-agent install-bridge --plugins-dir /tmp/sah-wheel-plugins
          test -f /tmp/sah-wheel-plugins/su_bridge/lib/su_bridge.rb
          test -f /tmp/sah-wheel-plugins/su_bridge.rb

      - name: Check installed wheel project initialization
        run: |
          /tmp/sah-wheel-venv/bin/sketchup-agent init /tmp/sah-wheel-project --template bathroom --force
          /tmp/sah-wheel-venv/bin/sketchup-agent validate /tmp/sah-wheel-project
          /tmp/sah-wheel-venv/bin/sketchup-agent install-skills /tmp/sah-wheel-project --target all --dry-run
          test -f /tmp/sah-wheel-project/.agents/skills/bathroom_planning/SKILL.md
          test -f /tmp/sah-wheel-project/.claude/skills/bathroom_planning/SKILL.md

  ruby-tests:
    name: Ruby Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        run: |
          cd su_bridge
          bundle install --path vendor/bundle

      - name: Run Ruby tests
        run: |
          cd su_bridge
          bundle exec rspec spec/ --format progress

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v13
        with:
          globs: |
            README.md
            INSTALLATION.md
            QUICKSTART.md
            DESIGNER_GUIDE.md
            DEVELOPMENT.md
            AGENTS.md
            CHANGELOG.md
            CONTRIBUTING.md
            skills/*.md
            skills/**/*.md
            docs/roadmap.md
            docs/architecture/*.md
