name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruby-syntax:
    name: Ruby Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Check Ruby syntax
        run: |
          find su_bridge/lib su_bridge/spec -name '*.rb' -print0 \
            | xargs -0 -n1 ruby -c

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          find mcp_server/mcp_server mcp_server/tests -name '*.py' -print0 \
            | xargs -0 python3 -m py_compile

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd mcp_server
          pip install uv
          uv sync --extra dev

      - name: Run Python tests
        run: |
          cd mcp_server
          uv run --extra dev pytest tests/ -m "not integration" -v --tb=short

      - name: Run release smoke
        run: |
          cd mcp_server
          uv run --extra dev sketchup-agent release-check \
            --with-wheel \
            --project-path /tmp/sah-ci-release \
            --plugins-dir /tmp/sah-ci-release-plugins \
            --wheel-dist-dir /tmp/sah-ci-dist \
            --wheel-venv-dir /tmp/sah-ci-wheel-venv \
            --wheel-project-path /tmp/sah-ci-wheel-project \
            --wheel-plugins-dir /tmp/sah-ci-wheel-plugins

  ruby-tests:
    name: Ruby Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        run: |
          cd su_bridge
          bundle install --path vendor/bundle

      - name: Run Ruby tests
        run: |
          cd su_bridge
          bundle exec rspec spec/ --format progress

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v13
        with:
          globs: |
            README.md
            INSTALLATION.md
            QUICKSTART.md
            DESIGNER_GUIDE.md
            DEVELOPMENT.md
            AGENTS.md
            CHANGELOG.md
            CONTRIBUTING.md
            skills/*.md
            skills/**/*.md
            docs/roadmap.md
            docs/architecture/*.md
