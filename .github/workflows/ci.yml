name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruby-syntax:
    name: Ruby Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Check Ruby syntax
        run: |
          for f in su_bridge/lib/su_bridge/**/*.rb su_bridge/spec/**/*.rb; do
            ruby -c "$f" || exit 1
          done

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python3 -m py_compile mcp_server/mcp_server/**/*.py
          python3 -m py_compile mcp_server/tests/**/*.py

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd mcp_server
          pip install uv
          uv sync --extra dev

      - name: Run Python tests
        run: |
          cd mcp_server
          uv run --extra dev pytest tests/ -m "not integration" -v --tb=short

  ruby-tests:
    name: Ruby Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        run: |
          cd su_bridge
          bundle install --path vendor/bundle

      - name: Run Ruby tests
        run: |
          cd su_bridge
          bundle exec rspec spec/ --format progress

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v13
        with:
          globs: |
            README.md
            INSTALLATION.md
            QUICKSTART.md
            DESIGNER_GUIDE.md
            DEVELOPMENT.md
            AGENTS.md
            CHANGELOG.md
            CONTRIBUTING.md
            docs/roadmap.md
            docs/architecture/bathroom-headless-slice.md
            docs/architecture/bridge-trace-execution.md
            docs/architecture/component-registry.md
            docs/architecture/project-workspace.md
            docs/architecture/runtime-vs-dev-skills.md
